name: CI/CD Pipeline

on:
  push:
    branches:
      - 'ci-cd-testing'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to private registry
        uses: docker/login-action@v1
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: '${{ secrets.REGISTRY_URL }}/${{ github.event.repository.name }}'
      - name: Notify on error
        uses: Ilshidur/action-discord@0.3.2
        if: failure() && steps.build.outcome == 'failure'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: "⚠️ The project {{ EVENT_PAYLOAD.repository.full_name }} could not build ⚠️  <https://github.com/{{ EVENT_PAYLOAD.repository.full_name }}/actions/runs/${{ github.run_id }}>"
